# Slice 0 farm — one row, ~10 panels. Seeded so a run is replayable from
# (config + seed + build). Consumed by world/farm_builder.py (Isaac-bound) and
# by run.py to lay out inspection targets.

seed: 20260721

# Grid layout (Z-up, meters). Slice 0 is a single row.
grid:
  rows: 1
  cols: 10
  row_pitch: 6.0      # meters between rows (front-to-back)
  col_pitch: 2.2      # meters between panels along a row
  origin: [0.0, 0.0, 0.0]

# Panel geometry. Built as a real solar-cell grid (not a flat swatch) so the
# camera frame reads as a PV module — cells + frame + localized fault patches.
panel:
  width: 1.0          # x, meters
  length: 2.0         # y, meters
  height: 0.05        # z, meters
  tilt_deg: 20.0      # south-facing tilt about the row axis
  mount_height: 0.75  # panel centre height above ground (shared: builder + waypoints)
  cell_cols: 6        # PV cells across the width (x)
  cell_rows: 10       # PV cells along the length (y)

# Georef anchor (§6.2): farm origin (0,0,0) -> this lat/lon/elev, with +Y
# pointing at heading_deg (compass bearing, 0 = north, clockwise).
georef:
  lat0: 33.4484       # placeholder site (Phoenix, AZ-ish)
  lon0: -112.0740
  elev0: 331.0
  heading_deg: 0.0

# Fault injection (ground truth). Seeded selection of panels flipped off-healthy.
# Slice 0 taxonomy subset: healthy | hotspot | soiled.
faults:
  rate: 0.2           # fraction of panels to fault (seeded pick)
  states: [hotspot, soiled]

# Terrain: the land is not flat. A deterministic low-frequency height field —
# panels mount ON the grade, and drone standoffs are measured from the panel top
# (terrain-relative), so framing stays correct over undulating ground.
terrain:
  kind: heightfield   # flat | heightfield
  amplitude: 0.6      # meters of vertical undulation (peak)
  wavelength: 14.0    # meters per hump (larger = gentler grade)

# Wind turbines co-located with the farm. Tall, with turning blades → moving
# shadows sweep the panels (the key false-fault test) + (later) collision/wake.
# Positions are stage-local meters (x along the row, y front-to-back).
# This block is SITE GEOGRAPHY (fixed placement). The DYNAMIC hazard axis —
# wind, sun/shadow angle, dust, birds, per-run spin/wake toggles — belongs in
# configs/scenarios/*.yaml (see docs/specs/04-interfaces-and-data.md IF-03),
# not here, so scenarios compose the farm rather than forking it.
turbines:
  - { pos: [9.5, -14.0], hub_height: 18.0, blade_len: 8.0, rpm: 12.0 }
  - { pos: [2.0, 16.0],  hub_height: 16.0, blade_len: 7.0, rpm: 10.0 }
