# SC-05 sweeping_shadow — the KPI-03 false-fault test (HAZ-07, the central thesis).
#
# Every panel is HEALTHY, a LOW sun casts long turbine-blade shadows across the
# row, and the blades spin so successive panels are inspected under a moving
# shadow. Any panel the perception layer flags as faulted is a FALSE fault — the
# metric is `false_fault_rate` (fraction of healthy panels misread), gated below.
#
# Composition only (IF-03): extends the base farm + the live-VLM mission and
# overrides just the dynamic hazard axis. Run:
#   ./python.sh -m solar_twin.world.farm_builder --scenario configs/scenarios/sweeping_shadow.yaml --out assets/scn.usd
#   ./python.sh -m solar_twin.run --scenario configs/scenarios/sweeping_shadow.yaml --backend sim_native --farm-usd assets/scn.usd --record

name: SC-05_sweeping_shadow
seed: 20260724

extends:
  farm: configs/farm.yaml
  mission: configs/mission_cosmos.yaml   # perception = cosmos_reason (live VLM)

farm_overrides:
  faults:
    rate: 0.0            # ALL panels healthy -> any fault verdict is a false fault
    states: []
  sun:
    # Shadow LENGTH must match the turbine->row distance, not just be "long": at
    # elev 16 a 14 m hub throws a ~49 m shadow that overshoots a 12 m-away row.
    # elev ~45 gives a ~14 m shadow that lands on the row (verified by capture).
    elevation_deg: 45.0
    azimuth_deg: 0.0     # tilt about +X -> light travels -Y, shadow cast in -Y
  turbines:              # turbine on the +Y side so its -Y shadow falls back ACROSS
    - { pos: [10.0, 12.0], hub_height: 14.0, blade_len: 7.0, rpm: 12.0 }  # the row (hub shadow lands ~Y=-2, sweeping the panels at Y=0)

kpi_gates:
  false_fault_rate_max: 0.05   # SLICE-3 establishes the baseline; this is the target
